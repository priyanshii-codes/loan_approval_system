<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Eligibility Checker</title>
<link rel="icon" type="image/png" href=assets/bank.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">

    <nav>
      <h1>Loan Approval Mini Suite</h1>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="eligibility.html" class="active">Eligibility Checker</a>
        <a href="explorer.html">Statistics Explorer</a>
      </div>
    </nav>

    <h2 class="page-title">Loan Eligibility Checker</h2>
    <p class="page-subtitle">
      Enter applicant details to check whether the loan is likely to be approved or rejected.
    </p>

    <div class="form-layout">
      <div class="form-card">
        <h3>Applicant Details</h3>

        <div class="form-grid">

          <div class="form-group">
            <label for="applicantName">Applicant Name</label>
            <input type="text" id="applicantName" placeholder="Enter applicant name" />
          </div>

          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="Enter city" />
          </div>

          <div class="form-group">
            <label for="income">Income</label>
            <input type="number" id="income" placeholder="Enter income" />
          </div>

          <div class="form-group">
            <label for="creditScore">Credit Score</label>
            <input type="number" id="creditScore" placeholder="Enter credit score" />
          </div>

          <div class="form-group">
            <label for="loanAmount">Loan Amount</label>
            <input type="number" id="loanAmount" placeholder="Enter loan amount" />
          </div>

          <div class="form-group">
            <label for="yearsEmployed">Years Employed</label>
            <input type="number" id="yearsEmployed" placeholder="Years employed" />
          </div>

          <div class="form-group full-width">
            <label for="points">Points</label>
            <input type="number" id="points" placeholder="Enter points" />
          </div>

          <div class="form-group full-width">
            <button id="checkEligibilityBtn">Check Eligibility</button>
          </div>
        </div>
      </div>

      <div class="result-card">
        <h3>Eligibility Result</h3>
        <div id="eligibilityResult">
          Fill the form and click <strong>Check Eligibility</strong>.
        </div>
      </div>
    </div>
  </div>

  <script src="js/eligibility.js"></script>
</body>
</html>
